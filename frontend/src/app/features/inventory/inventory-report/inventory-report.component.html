<section class="section">
  <h2>Inventory Report</h2>

  <form [formGroup]="reportForm">

    <mat-form-field appearance="outline">
      <mat-label>Product ID (optional)</mat-label>
      <input matInput type="number" formControlName="productId">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Start date</mat-label>
      <input matInput [matDatepicker]="dp1" formControlName="startDate">
      <mat-datepicker-toggle matSuffix [for]="dp1"></mat-datepicker-toggle>
      <mat-datepicker #dp1></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>End date</mat-label>
      <input matInput [matDatepicker]="dp2" formControlName="endDate">
      <mat-datepicker-toggle matSuffix [for]="dp2"></mat-datepicker-toggle>
      <mat-datepicker #dp2></mat-datepicker>
    </mat-form-field>

    <button mat-raised-button color="primary" (click)="generatePdf()">
      Generate PDF
    </button>

  </form>
</section>
