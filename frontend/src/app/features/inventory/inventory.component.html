<!-- filter section -->
<mat-progress-bar *ngIf="loading" mode="indeterminate"></mat-progress-bar>

<section class="section">
  <h2>Inventory filter</h2>

  <form [formGroup]="filterForm" class="form-row">

    <mat-form-field appearance="outline">
      <mat-label>Product ID</mat-label>
      <input matInput type="number" formControlName="productId">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Min quantity</mat-label>
      <input matInput type="number" formControlName="minQuantity">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Max quantity</mat-label>
      <input matInput type="number" formControlName="maxQuantity">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Product name</mat-label>
      <input matInput formControlName="productName">
    </mat-form-field>

    <div class="checkbox-wrapper">
      <mat-checkbox formControlName="isLowStock"></mat-checkbox>
      <span class="checkbox-label">Low stock</span>
    </div>

    <div class="actions">
      <button mat-raised-button color="primary" (click)="applyFilter()">
        Filter
      </button>
      <button mat-button (click)="clearFilter()">Clear</button>
    </div>

  </form>
</section>

<hr>

<!-- crud form section -->
<section class="section">
  <h2>{{ editingId ? 'Update inventory' : 'Add inventory' }}</h2>

  <form [formGroup]="inventoryForm" class="form-row">

    <mat-form-field appearance="outline">
      <mat-label>Product ID</mat-label>
      <input matInput type="number" formControlName="productId">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Quantity</mat-label>
      <input matInput type="number" formControlName="quantity">
    </mat-form-field>

    <div class="actions">
      <button mat-raised-button color="accent" (click)="saveInventory()">
        {{ editingId ? 'Update' : 'Save' }}
      </button>
    </div>

  </form>
</section>

<hr>

<!-- table -->
<section class="section">
  <h2>Inventory list</h2>

  <table mat-table [dataSource]="inventories" class="mat-elevation-z8">

    <!-- Product -->
    <ng-container matColumnDef="productName">
      <th mat-header-cell *matHeaderCellDef> Product </th>
      <td mat-cell *matCellDef="let item">
        {{ item.productName }}
      </td>
    </ng-container>

    <!-- Quantity -->
    <ng-container matColumnDef="quantity">
      <th mat-header-cell *matHeaderCellDef> Quantity </th>
      <td mat-cell *matCellDef="let item">
        {{ item.quantity }}
      </td>
    </ng-container>

    <!-- Last updated -->
    <ng-container matColumnDef="lastUpdated">
      <th mat-header-cell *matHeaderCellDef> Last updated </th>
      <td mat-cell *matCellDef="let item">
        {{ item.lastUpdated | date:'short' }}
      </td>
    </ng-container>

    <!-- Actions -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Actions </th>
      <td mat-cell *matCellDef="let item">
        <button mat-button (click)="edit(item)">Edit</button>
        <button mat-button color="warn" (click)="delete(item)">
          Delete
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>
</section>

   <!-- paginator -->
<mat-paginator
  [length] = "totalCount"
  [pageSize]="pageSize"
  [pageSizeOptions]="[10]"
  (page) ="onPageChange($event)">
</mat-paginator>
