<div class="auth-container">
  <form [formGroup]="form" (ngSubmit)="submit()" class="register-form">

    <h2>Create account</h2>
    <p class="subtitle">Join our MOBILE SHOP platform</p>

    <div class="form-group">
      <label>Full name</label>
      <input type="text" placeholder="John Doe" formControlName="fullName"/>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="example@gmail.com" formControlName="email"/>
      <div class="error"
           *ngIf="form.get('email')?.touched && form.get('email')?.errors?.['invalidDomain']">
        Please enter a valid email address.
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" placeholder="Minimum 6 characters" formControlName="password"/>
      <div class="error"
           *ngIf="form.get('password')?.touched && form.get('password')?.errors?.['minlength']">
        Password must have at least 6 characters.
      </div>
    </div>

    <div class="form-group">
      <label>Confirm password</label>
      <input type="password" placeholder="Repeat password" formControlName="confirmPassword"/>
      <div class="error" *ngIf="showPasswordMismatch">
        Passwords do not match.
      </div>
    </div>

    <button type="submit" [disabled]="loading">
      {{ loading ? 'Creating account...' : 'Register' }}
    </button>

    <p class="login-text">
      Already have an account?
      <button type="button" routerLink="/login" class="login-button">
        Login
      </button>
    </p>

  </form>
</div>
